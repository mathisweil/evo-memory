# M1 LoRA-only — SFT fine-tuning on 5-task QA subset, no NAMM
# FAIR-01 compliant. See experiment_specification.md §3 M1.
#
# M1 is the anchor condition. All LoRA hyperparameters here MUST match the
# corresponding keys in `lora_rh_m4_instruct_5t.yaml` (M3) and
# `joint_lora_m4_5t.yaml` (M4). Length filtering (min/max_conditioning_length
# =4096/6500) comes from the Hydra preset `run_config: namm_bam_i1_llama32_1b_5t`,
# NOT from this YAML.
#
# Usage:
#   python scripts/run_lora.py --config scripts/configs/lora_rh_m1_instruct_5t.yaml --run_name m1_r8
#
# Rank sweep:
#   --lora_rank 4 --lora_alpha 8      (M1-r4)
#   (default: r=8, alpha=16)           (M1-r8, main table)
#   --lora_rank 16 --lora_alpha 32    (M1-r16)

# -- Experiment ---------------------------------------------------------------
run_name: null
experiment: null
method: rh_m1_lora_instruct_5t

# -- LoRA hyperparameters -----------------------------------------------------
lora_rank: 8
lora_target_modules: [q_proj, v_proj]
lora_alpha: 16
lora_dropout: 0.1
learning_rate: 5e-5
weight_decay: 0.01
max_grad_norm: 1.0
warmup_ratio: 0.03
num_epochs: 100
batch_size: 1                # matches M3/M4 for controlled per-step processing (NAMM OOMs at bs=2, see docs/namm_memory_investigation.md)
gradient_accumulation_steps: 16  # effective batch = 16
max_seq_len: 7000
sft_mode: true
dtype: bfloat16
always_save_checkpoint: true

# -- NAMM (disabled for M1) ---------------------------------------------------
namm_active: false
namm_checkpoint: null
run_config: namm_bam_i1_llama32_1b_5t
cache_size: null

# -- Data (FAIR-01) -----------------------------------------------------------
filter_by_tokens: null
filter_answers_by_tokens: 64
train_split: 0.7
val_split: 0.15
split_seed: 42

# -- Evaluation ---------------------------------------------------------------
eval_interval: 2
log_interval: 2
batch_size_eval: 4            # matches M3 — no NAMM here means even more headroom
early_stopping_patience: 20   # raised from 5 (too aggressive for 150-epoch schedule)

# -- Wandb --------------------------------------------------------------------
wandb_entity: SNLP_NAMM
wandb_project: Experiments

# -- Checkpointing & GCS -----------------------------------------------------
gcs: true
resume_checkpoint: null

# -- Advanced -----------------------------------------------------------------
override: []
