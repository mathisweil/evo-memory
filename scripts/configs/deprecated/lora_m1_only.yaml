# DEPRECATED: Early prototype config (non-FAIR-01). Uses train_split=0.8,
# sft_mode=false, num_epochs=2, lr=2e-4, and 3-task run_config.
# For FAIR-01 M1 runs use lora_rh_m1_instruct_5t.yaml instead.
#
# Usage:
#   python scripts/run_lora.py --config scripts/configs/lora_m1_only.yaml --run_name m1_test

# ── Experiment ──────────────────────────────────────────────────────────
run_name: null
experiment: null
method: m1_lora_only

# ── LoRA hyperparameters ────────────────────────────────────────────────
lora_rank: 8
lora_target_modules: [q_proj, v_proj]
lora_alpha: null
lora_dropout: 0.0
learning_rate: 2e-4
weight_decay: 0.01
max_grad_norm: 1.0
warmup_ratio: 0.03
num_epochs: 2
batch_size: 8
gradient_accumulation_steps: 2
max_seq_len: 3500
sft_mode: false

# ── NAMM ────────────────────────────────────────────────────────────────
namm_active: false
namm_checkpoint: null
run_config: namm_bam_i1_llama32_1b
cache_size: null

# ── Data ────────────────────────────────────────────────────────────────
filter_by_tokens: null
filter_answers_by_tokens: 64
train_split: 0.8
val_split: 0.1
split_seed: 42

# ── Evaluation ──────────────────────────────────────────────────────────
eval_interval: 300
log_interval: 10
batch_size_eval: null

# ── Checkpointing & GCS ────────────────────────────────────────────────
gcs: true
checkpoint_every: 0
resume_checkpoint: null

# ── Advanced ────────────────────────────────────────────────────────────
override: []
