# M3 LoRA + frozen NAMM — SFT fine-tuning on 5-task QA subset with NAMM active
# FAIR-01 compliant. See experiment_specification.md §3 M3.
#
# Historical naming: "rh_m4_frozen" predates the M-numbering. M3 in the spec
# corresponds to the rh_m4_frozen method. Do NOT rename — WandB and GCS paths
# depend on it.
#
# Usage:
#   python scripts/run_lora.py \
#       --config scripts/configs/lora_rh_m4_instruct_5t.yaml \
#       --run_name m3_lora_frozen_namm \
#       --namm_checkpoint <path-to-m2-checkpoint>

# -- Experiment ---------------------------------------------------------------
run_name: null
experiment: null
method: rh_m4_frozen_5t

# -- LoRA hyperparameters -----------------------------------------------------
lora_rank: 8
lora_target_modules: [q_proj, v_proj]
lora_alpha: 16
lora_dropout: 0.05
learning_rate: 1e-4
weight_decay: 0.01
max_grad_norm: 1.0
warmup_ratio: 0.03
num_epochs: 150
batch_size: 1
gradient_accumulation_steps: 16
max_seq_len: 7000
sft_mode: true

# -- NAMM (active — requires --namm_checkpoint at runtime) --------------------
namm_active: true
namm_checkpoint: null
run_config: namm_bam_i1_llama32_1b_5t
cache_size: 1024

# -- Data (FAIR-01) -----------------------------------------------------------
filter_by_tokens: null
filter_answers_by_tokens: 64
train_split: 0.7
val_split: 0.15
split_seed: 42

# -- Evaluation ---------------------------------------------------------------
eval_interval: 8
log_interval: 5
batch_size_eval: 2
early_stopping_patience: 5

# -- Wandb --------------------------------------------------------------------
wandb_entity: SNLP_NAMM
wandb_project: Experiments

# -- Checkpointing & GCS -----------------------------------------------------
gcs: true
resume_checkpoint: null

# -- Advanced -----------------------------------------------------------------
override: []
