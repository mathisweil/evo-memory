# M4 Joint LoRA + NAMM — alternating co-training on 5-task QA subset
# FAIR-01 compliant. See experiment_specification.md §3 M4.
#
# Overrides joint_default.yaml with adapter_type=lora and learning_rate=5e-5
# (matching M1). Use this instead of joint_default.yaml for M4-LoRA runs.
#
# Usage:
#   python scripts/run_joint.py \
#       --config scripts/configs/m4_joint_lora_5t.yaml \
#       --run_name m4_joint_lora

# -- Experiment ---------------------------------------------------------------
run_name: null
experiment: null

# -- Joint training -----------------------------------------------------------
# 3 outer loops × (67 NAMM + 50 LoRA) = 201 NAMM gens + 150 LoRA epochs total,
# matching M1's 150 epochs and M2's 200 NAMM generations. The 3-loop design
# gives 2 co-adaptation cycles instead of 1; each LoRA stage early-stops at
# ~30 epochs in practice via best-checkpoint selection, so 50 allocated
# epochs provides ~20 epochs of headroom. NAMM warm-starts across loops.
adapter_type: lora
num_outer_loops: 3
namm_iterations_per_stage: 67
adapter_iterations_per_stage: 25
lora_epochs_per_stage: 50
eval_after_each_loop: true

# -- NAMM config --------------------------------------------------------------
run_config: namm_bam_i1_llama32_1b_5t
namm_checkpoint: null
cache_size: 1024
namm_eval_interval: 10

# -- ES hyperparameters (unused for adapter_type=lora, kept for completeness) -
sigma: 0.001
alpha: 0.0005
population_size: 8
noise_mode: correlated
initial_seed: 33
mini_batch_size: 16

# -- LoRA hyperparameters (M4 matches M1 lr) ----------------------------------
lora_rank: 8
lora_target_modules: [q_proj, v_proj]
lora_alpha: 16
lora_dropout: 0.1
learning_rate: 5e-5
weight_decay: 0.01
max_grad_norm: 1.0
warmup_ratio: 0.03
lora_batch_size: 4          # per-device batch size (NAMM active -> typically 1)
gradient_accumulation_steps: 4  # effective_batch = lora_batch_size * grad_accum
max_seq_len: 7000
sft_mode: true
lora_eval_interval: 14      # matches M1/M3 — enables best-of-N checkpointing within each LoRA stage
lora_log_interval: 2       # logging interval within LoRA stages
lora_early_stopping_patience: 20   # matches M1/M3; applies per-stage, outer loop continues
lora_eval_batch_size: 8     # per-stage eval batch size during LoRA Stage B; matches M1/M3 batch_size_eval=8. null = inherit global evaluator setting.
dtype: bfloat16

# -- Data (FAIR-01) -----------------------------------------------------------
train_split: 0.7
val_split: 0.15
split_seed: 42
min_conditioning_length: 4096
max_conditioning_length: 6500
max_answer_tokens: 64
filter_by_tokens: null
filter_answers_by_tokens: 64

# -- Evaluation ---------------------------------------------------------------
batch_size: null

# -- Wandb --------------------------------------------------------------------
wandb_log: true
wandb_entity: SNLP_NAMM
wandb_project: Experiments
wandb_run_name: null
wandb_group_name: null

# -- Advanced -----------------------------------------------------------------
override: []
