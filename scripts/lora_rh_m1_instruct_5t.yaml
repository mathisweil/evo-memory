# LoRA-only training on 5-task QA dataset (>4096 tokens).
# Dropped multifieldqa_en (too few long prompts).
#
# Usage:
#   python scripts/run_lora.py --config scripts/lora_rh_m1_instruct_5t.yaml --run_name rh_m1_5t

# ── Experiment ──────────────────────────────────────────────────────────
run_name: null
experiment: null
method: rh_m1_lora_instruct_5t

# ── LoRA hyperparameters ──────────────────────────────────────────────
lora_rank: 8
lora_target_modules: [q_proj, v_proj]
lora_alpha: 16
lora_dropout: 0.1
learning_rate: 5e-5
weight_decay: 0.01
max_grad_norm: 1.0
warmup_ratio: 0.03
num_epochs: 150
batch_size: 4
gradient_accumulation_steps: 4
max_seq_len: 7000
sft_mode: true

# ── NAMM ────────────────────────────────────────────────────────────────
namm_active: false
namm_checkpoint: null
run_config: namm_bam_i1_llama32_1b_5t
cache_size: null

# ── Data ────────────────────────────────────────────────────────────────
filter_by_tokens: null
filter_answers_by_tokens: 64
train_split: 0.7
val_split: 0.15
split_seed: 42

# ── Evaluation ──────────────────────────────────────────────────────────
eval_interval: 2
log_interval: 5
batch_size_eval: 4

# ── Checkpointing & GCS ────────────────────────────────────────────────
gcs: true
checkpoint_every: 0
resume_checkpoint: null

# ── Advanced ────────────────────────────────────────────────────────────
override:
  - "task_sampler.tasks=[lb/qasper,lb/2wikimqa,lb/qasper_e,lb/hotpotqa_e,lb/2wikimqa_e]"
  - "max_position_id=8192"
  - "max_conditioning_length=6500"
  - "min_conditioning_length=4096"
  - "max_new_tokens=64"
  - "max_gen_tokens=64"
