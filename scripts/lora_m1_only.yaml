# m1 condition: LoRA-only finetuning on QASPER, no NAMM eviction, full KV cache.
# Ported from cfgs/run/m1_lora_only.yaml (eda3f19).
# Token budget anchor for FAIR-01: all other conditions must use the same
# num_epochs, gradient_accumulation_steps, and task set.
#
# Usage:
#   python scripts/run_lora.py --config scripts/lora_m1_only.yaml --run_name m1_test

# ── Experiment ──────────────────────────────────────────────────────────
run_name: null
experiment: null
method: m1_lora_only

# ── LoRA hyperparameters ────────────────────────────────────────────────
lora_rank: 8
lora_target_modules: [q_proj, v_proj]
lora_alpha: null
lora_dropout: 0.0
learning_rate: 2e-4
weight_decay: 0.01
max_grad_norm: 1.0
warmup_ratio: 0.03
num_epochs: 2
batch_size: 1
gradient_accumulation_steps: 16
max_seq_len: 3500
sft_mode: false

# ── NAMM ────────────────────────────────────────────────────────────────
namm_active: false
namm_checkpoint: null
run_config: namm_bam_i1_llama32_1b
cache_size: null

# ── Data ────────────────────────────────────────────────────────────────
filter_by_tokens: null
filter_answers_by_tokens: 64
train_split: 0.8
val_split: 0.1
split_seed: 42

# ── Evaluation ──────────────────────────────────────────────────────────
eval_interval: 40
log_interval: 10
batch_size_eval: null

# ── Checkpointing & GCS ────────────────────────────────────────────────
gcs: true
checkpoint_every: 0
resume_checkpoint: null

# ── Advanced ────────────────────────────────────────────────────────────
override: []
