# @package _global_
# Stage 1 training of NAMM on LLaMA 3.2-1B
# Task: qasper (F1-based QA — smoother signal for CMA-ES than binary passage_retrieval)
# pop_size=8, samples_batch_size=16, cache_size=1024 (matched to Romain's config)
defaults:
  - base_memory_policy/deep/bam/base_bam
  - override /model/wrapped_llm@_global_: llama32-1b
  - override /task@_global_: rh_multi_qa
  - _self_

run_name_suffix: 'llama32-1b-stage1'

# KV cache budget: 1024 tokens per layer (matched to Romain's config).
# With fixed_delay=256, NAMM manages 768 slots.
cache_size: 1024
max_new_tokens: 64

scoring_reduction_mode:
embedding_reduction_mode: ema

# EMA params
embedding_ema_coeff: 0.99
embedding_reduction_learned: false

# BAM scoring network params (kept same as original)
scoring_attn_hidden_dim: 32
scoring_attn_output_dim:
scoring_attn_num_heads: 1
scoring_attn_bias: true
scoring_attn_use_rope: false
scoring_attn_rope_theta: 50000
scoring_attn_masking_strategy: backward

# STFT spectrogram params
n_fft: 32
hop_length: 16
window_fn:
  _target_: utils.hydra_helpers.torch.hann_window
  window_length: ${n_fft}
  periodic: true
window_fn_log_name: hann
pad_mode: constant
output_magnitudes: true

# Reduced population size for single-GPU training (original: 32)
pop_size: 8
# 16 samples per step (matched to Romain's config)
samples_batch_size: 16
# Inference batch size: "auto" detects largest batch size that fits in GPU memory.
# eval_max_batch_size is the upper bound for auto-detection (binary search start).
batch_size: 4
eval_max_batch_size: 4

scoring_initializer: 0
always_save_checkpoint: true
keep_past_epoch_checkpoints_every: 25

# 200 iterations with 16 samples/step (matched to Romain's config)
max_iters: 200

# Memory policy: fixed delay < cache_size so NAMM has tokens to manage
memory_policy_fixed_delay: 256
max_memory_length: 1024

# No reference scores for 1B model; use raw task scores as fitness
score_normalization_reference:

train_frac: 0.7
val_frac: 0.15

device: 'cuda'

wandb_log: true
add_bos_token: true
