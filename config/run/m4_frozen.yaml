# @package _global_
#
# m4-frozen condition: NAMM policy loaded from best checkpoint and frozen.
# LoRA trained with NAMM actively evicting KV cache at cache_size=128.
# Token budget identical to m1 (FAIR-01).

defaults:
  - override /trainer@_global_: lora_grad
  - override /model/wrapped_llm@_global_: llama32-1b
  - override /policy/deep_embedding@_global_: attn_spec_norm
  - override /evolution@_global_: dummy
  - _self_

trainer_type: lora_grad
lora_method: m4_frozen

# NAMM is active and frozen during LoRA training
lora_namm_active: true

# NAMM evicts to this token budget during training
cache_size: 128

# CRITICAL: must match the NAMM checkpoint trained with pop_size=8
# (mismatch causes state dict shape error at load time)
pop_size: 8

# Set NAMM_CKPT env var to the absolute path of the trained NAMM checkpoint
init_from: ${oc.env:NAMM_CKPT}

# Match m1 seq len for FAIR-01 comparability
lora_max_seq_len: 2048

# FAIR-01: identical to m1_lora_only.yaml
lora_num_epochs: 3
lora_task_names:
  - qasper
lora_gradient_accumulation_steps: 16

# wandb
wandb_run_name: m4-frozen-cs128-llama32-1b-seed${seed}
wandb_group_name: Llama-3.2-1B/grad-lora-study
wandb_project: memory_evolution_hf
wandb_log: true
