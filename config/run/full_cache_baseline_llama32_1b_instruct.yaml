# @package _global_
# Full-cache baseline for LLaMA 3.2-1B-Instruct: no KV-cache eviction.
# Used as the reference floor when comparing instruct-based methods (m1-SFT, etc.).
defaults:
  - override /model/wrapped_llm@_global_: llama32-1b-instruct
  - override /task@_global_: lb_3subset_eval
  - override /evolution@_global_: dummy
  - override /policy@_global_: none
  - override /typing@_global_: half_attn
  - override /auxiliary_loss@_global_: none
  - _self_

cache_size: ${max_position_id}
max_new_tokens: 128

batch_size: 4

eval_only: true
pop_size: 1

add_bos_token: true
score_normalization_reference:
ddp_timeout_limit: '0:3:0'

wandb_log: true
wandb_project: memory_evolution_hf
wandb_group_name: Llama-3.2-1B-Instruct/eval-comparison
wandb_run_name: full-cache-instruct-cs${cache_size}-llama32-1b
