defaults:
  - _self_
  - trainer@_global_: default
  - model@_global_: hf_evaluator
  - typing@_global_: default
  - policy@_global_: deep
  - auxiliary_loss@_global_: none
  - evolution@_global_: cma_es
  - task@_global_: passage_retrieval_en
  - run@_global_: default

wandb_config:
  _target_: namm.trainer.WandbConfig
  wandb_log: ${wandb_log}
  wandb_project: ${wandb_project}
  wandb_entity: ${wandb_entity}
  wandb_run_name: ${wandb_run_name}
  wandb_group_name: ${wandb_group_name}


out_folder: ./experiments/namm_only_runs
out_dir: '${out_folder}/${wandb_project}/${wandb_group_name}/${wandb_run_name}/${seed}'

# wandb logging
wandb_log: true # enabled by default
wandb_entity: SNLP_NAMM
wandb_project: Experiments
wandb_run_name: default_configs_test
wandb_group_name: tests

# system — 'auto' uses TPU if available, else CUDA, else CPU
device: 'auto'
seed: 1337
deterministic_behavior: false

# ddp settings
backend: 'nccl' # 'nccl', 'gloo', etc.
ddp_timeout_limit: '0:6:0' # days:hours:minutes

# Eviction mode — set to true to train with threshold-only eviction (NAMM
# paper's original rule: evict all tokens with score < 0, no hard top-k cap).
# When false (default), selection_criteria.cache_size enforces a fixed budget.
# Override at launch: python scripts/run_namm.py threshold_only=true
threshold_only: false

hydra:
  run:
    dir: ${out_dir}/