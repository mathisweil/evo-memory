defaults:
  - _self_

# Optional path to a saved LoRA adapter directory (e.g. for M3 sequential).
# When set, the adapter is merged into the base weights before NAMM training.
adapter_path: null

pretrained_llm:
  _target_: utils.hydra_helpers.AutoModelForCausalLM.from_pretrained
  pretrained_model_name_or_path: ${pretrained_llm_name}

tokenizer:
  _target_: utils.hydra_helpers.AutoTokenizer.from_pretrained
  pretrained_model_name_or_path: ${pretrained_llm_name}

pretrained_llm_name: meta-llama/Meta-Llama-3-8B


memory_model:
  _target_: namm.llms.llama.WrappedLlamaForCausalLM
  model: ${pretrained_llm}
  memory_policy: ${memory_policy}  
  max_new_tokens: ${max_new_tokens}
  memory_policy_fixed_delay: ${memory_policy_fixed_delay}
  output_attentions_full_precision: ${output_attentions_full_precision}

# needs to specify only for non memory_models
max_new_tokens:
max_position_id: 2048
max_conditioning_length: ${max_position_id}
memory_policy_fixed_delay: