defaults:
  - base
  - _self_

# LLaMA 3.2-1B-Instruct: same architecture as base, chat-tuned with RLHF.
# Requires LlamaCompatModel to patch rope_scaling (same transformers 4.41.x issue as base).
#
# Set LLM_MODEL_PATH to either a local snapshot directory or a HuggingFace model ID
# (e.g. "meta-llama/Llama-3.2-1B-Instruct" or "/path/to/local/llama-1b-instruct-hf").
pretrained_llm_name: ${oc.env:LLM_MODEL_PATH,meta-llama/Llama-3.2-1B-Instruct}

# Use LlamaCompatModel to patch rope_scaling (same fix as base — llama3 rope_type)
pretrained_llm:
  _target_: utils.hydra.LlamaCompatModel.from_pretrained
  pretrained_model_name_or_path: ${pretrained_llm_name}
  max_position_embeddings: ${max_position_id}

memory_model:
  _target_: models.llama.WrappedLlamaForCausalLM
  model: ${pretrained_llm}
  memory_policy: ${memory_policy}
  max_new_tokens: ${max_new_tokens}
  memory_policy_fixed_delay: ${memory_policy_fixed_delay}
  output_attentions_full_precision: ${output_attentions_full_precision}

max_new_tokens: 128
max_position_id: 8192
max_conditioning_length: ${max_position_id}
memory_policy_fixed_delay:

llm_log_name: Llama-3.2-1B-Instruct
