# @package _global_
# Llama 3.2 1B — recency eviction eval on PassageRetrieval-en (out-of-distribution).
defaults:
  - override /model/wrapped_llm@_global_: llama_3_2_1b
  - override /task@_global_: passage_retrieval_en
  - override /policy@_global_: none
  - override /typing@_global_: half_attn
  - override /auxiliary_loss@_global_: none
  - override /evolution@_global_: dummy
  - _self_

eval_only: true
init_from: null
max_new_tokens: 32
max_conditioning_length:
eval_max_batch_size: 1
add_bos_token: true
score_normalization_reference: null
dtype: bfloat16
wandb_log: true
wandb_project: memory_evolution_hf
wandb_run_name: llama32_recency_${cache_size}_passage_retrieval
wandb_group_name: Llama-3.2-1B
seed: 1337
batch_size: 1
samples_batch_size: 4
eval_samples_batch_size:

cache_size: 1024
