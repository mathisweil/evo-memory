# @package _global_
# Recency baseline for LLaMA 3.2-1B: keep only the last `cache_size` tokens.
# Identical cache budget (256 default) as the trained NAMM — apples-to-apples comparison.
#
# Override cache_size from the CLI to match any NAMM eval budget, e.g.:
#   torchrun ... scripts/run_namm.py run@_global_=recency_baseline_llama32_1b.yaml cache_size=512
defaults:
  - override /model/wrapped_llm@_global_: llama32-1b
  - override /task@_global_: lb_3subset_eval
  - override /evolution@_global_: dummy
  - override /policy@_global_: none
  - override /typing@_global_: half_attn
  - override /auxiliary_loss@_global_: none
  - _self_

# Must match the NAMM eval cache_size for a fair comparison
cache_size: 256
max_new_tokens: 128

batch_size: 4

eval_only: true
pop_size: 1

add_bos_token: true
score_normalization_reference:
ddp_timeout_limit: '0:3:0'

# wandb — same project/group as NAMM eval so all methods appear together
wandb_log: true
wandb_project: memory_evolution_hf
wandb_group_name: Llama-3.2-1B/eval-comparison
wandb_run_name: recency-cs${cache_size}-llama32-1b
