# @package _global_
# Llama 3.2 1B Instruct + NAMM (no LoRA) — eval on held-out 25% Qasper test split.
# Override cache_size on CLI: cache_size=1024, cache_size=2048, cache_size=4096
defaults:
  - base_memory_policy/deep/bam/base_bam
  - override /model/wrapped_llm@_global_: llama_3_2_1b
  - override /task@_global_: qasper
  - _self_

pretrained_llm_name: ./llama-1b-instruct-hf

eval_only: true
max_new_tokens: 64
max_conditioning_length: 6500
score_normalization_reference: null
dtype: bfloat16
seed: 1337
batch_size: 1
samples_batch_size: 4
eval_max_batch_size: 4
eval_samples_batch_size:
add_bos_token: true

cache_size: 1024
memory_policy_fixed_delay: 256

# architecture — must match NAMM training
scoring_attn_hidden_dim: 32
scoring_attn_bias: true

init_from: 'exp_local/memory_evolution_hf/Llama-3.2-1B/llama32_instruct_namm_multi_qa/1337/ckpt.pt'

pop_size: 8

# Train/test split: same 75/25 as all other evals
train_split_ratio: 0.75

# Include a second training task so same_test_train_tasks=False,
# forcing the trainer to evaluate the test split separately.
tasks:
  - "lb/qasper"
  - "lb/multifieldqa_en"

training_tasks_subset:
  - "lb/qasper"
  - "lb/multifieldqa_en"
test_tasks_subset:
  - "lb/qasper"

wandb_log: true
wandb_project: memory_evolution_hf
wandb_run_name: llama32_instruct_namm_${cache_size}_qasper_eval
wandb_group_name: Llama-3.2-1B
