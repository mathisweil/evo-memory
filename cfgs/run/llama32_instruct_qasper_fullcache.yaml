# @package _global_
# Llama 3.2 1B Instruct — full cache (no eviction) eval on Qasper.
# Evaluates on the same held-out 25% qasper split as NAMM/LoRA.
defaults:
  - override /model/wrapped_llm@_global_: llama_3_2_1b
  - override /task@_global_: qasper
  - override /policy@_global_: none
  - override /typing@_global_: half_attn
  - override /auxiliary_loss@_global_: none
  - override /evolution@_global_: dummy
  - _self_

pretrained_llm_name: ./llama-1b-instruct-hf

eval_only: true
init_from: null
max_new_tokens: 64
max_conditioning_length: 6500
eval_max_batch_size: 4
add_bos_token: true
score_normalization_reference: null
dtype: bfloat16
seed: 1337
batch_size: 1
samples_batch_size: 4
eval_samples_batch_size:

train_split_ratio: 0.75

# Include a second training task so same_test_train_tasks=False,
# forcing the trainer to evaluate the test split separately.
tasks:
  - "lb/qasper"
  - "lb/multifieldqa_en"

training_tasks_subset:
  - "lb/qasper"
  - "lb/multifieldqa_en"
test_tasks_subset:
  - "lb/qasper"

wandb_log: true
wandb_project: memory_evolution_hf
wandb_run_name: llama32_instruct_fullcache_qasper
wandb_group_name: Llama-3.2-1B
