# @package _global_
# Evaluate trained NAMM on LLaMA 3.2-1B-Instruct against the 3-task subset.
# Run AFTER instruct stage 1 training; point init_from at the output ckpt.pt.
#
# Override cache_size from the CLI to evaluate at multiple budgets.
defaults:
  - base_memory_policy/deep/bam/base_bam
  - override /model/wrapped_llm@_global_: llama32-1b-instruct
  - override /task@_global_: lb_3subset_eval
  - _self_

run_name_suffix: 'llama32-1b-instruct-eval'

cache_size: 1024
max_new_tokens: 64

scoring_reduction_mode:
embedding_reduction_mode: ema

embedding_ema_coeff: 0.99
embedding_reduction_learned: false

scoring_attn_hidden_dim: 32
scoring_attn_output_dim:
scoring_attn_num_heads: 1
scoring_attn_bias: true
scoring_attn_use_rope: false
scoring_attn_rope_theta: 50000
scoring_attn_masking_strategy: backward

n_fft: 32
hop_length: 16
window_fn:
  _target_: utils_hydra.torch.hann_window
  window_length: ${n_fft}
  periodic: true
window_fn_log_name: hann
pad_mode: constant
output_magnitudes: true

init_from: ~

pop_size: 8
scoring_initializer: 0
keep_past_epoch_checkpoints_every: 1

batch_size: 4

scratch: false
eval_only: true
ddp_timeout_limit: '0:3:0'

score_normalization_reference:
add_bos_token: true

wandb_log: true
wandb_project: memory_evolution_hf
wandb_group_name: Llama-3.2-1B-Instruct/chat-template-evals
wandb_run_name: namm-instruct-cs${cache_size}-llama32-1b
