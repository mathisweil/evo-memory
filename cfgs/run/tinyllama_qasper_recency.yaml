# @package _global_
defaults:
  - override /model/wrapped_llm@_global_: tiny_llama
  - override /task@_global_: qasper
  - override /policy@_global_: none
  - override /typing@_global_: half_attn
  - override /auxiliary_loss@_global_: none
  - override /evolution@_global_: dummy
  - _self_

eval_only: true
init_from: null
max_new_tokens: 64
max_conditioning_length: 6500
eval_max_batch_size: 1
add_bos_token: true
score_normalization_reference: null
dtype: bfloat16
wandb_log: true
wandb_project: memory_evolution_hf
wandb_run_name: tinyllama_recency_${cache_size}_qasper
wandb_group_name: baselines
seed: 1337
batch_size: 1
samples_batch_size: 1

# Override cache_size on the command line, e.g. cache_size=512
cache_size: 512
