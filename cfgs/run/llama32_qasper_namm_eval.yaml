# @package _global_
# Llama 3.2 1B + NAMM — eval on Qasper (in-distribution).
# Loads NAMM checkpoint trained on Qasper with cache_size=1024.
defaults:
  - base_memory_policy/deep/bam/base_bam
  - override /model/wrapped_llm@_global_: llama_3_2_1b
  - override /task@_global_: qasper
  - _self_

eval_only: true
max_new_tokens: 64
max_conditioning_length: 6500
score_normalization_reference: null

cache_size: 1024
memory_policy_fixed_delay: 256

# architecture — must match training
scoring_attn_hidden_dim: 32
scoring_attn_bias: true

init_from: 'exp_local/memory_evolution_hf/Llama-3.2-1B/llama32_namm_1024cs_qasper/1337/ckpt.pt'

pop_size: 8
wandb_log: true
wandb_run_name: llama32_namm_1024cs_qasper_eval
wandb_group_name: Llama-3.2-1B
wandb_project: memory_evolution_hf
