defaults:
  - base
  - _self_

# LLaMA 3.2-1B: 16 layers, 2048 hidden, 32 heads (8 KV via GQA), head_dim=64
pretrained_llm_name: /cs/student/project_msc/2025/csml/gmaralla/.hf_cache/hub/models--meta-llama--Llama-3.2-1B/snapshots/4e20de362430cd3b72f300e6b0f18e50e7166e08

# Use LlamaCompatModel to patch rope_scaling (llama3 type not in transformers 4.41.x)
# max_position_embeddings=4096 reduces RoPE cache to 4096 positions (saves ~400MB)
pretrained_llm:
  _target_: utils_hydra.LlamaCompatModel.from_pretrained
  pretrained_model_name_or_path: ${pretrained_llm_name}
  max_position_embeddings: 4096

memory_model:
  _target_: memory_llms.llama.WrappedLlamaForCausalLM
  model: ${pretrained_llm}
  memory_policy: ${memory_policy}
  max_new_tokens: ${max_new_tokens}
  memory_policy_fixed_delay: ${memory_policy_fixed_delay}
  output_attentions_full_precision: ${output_attentions_full_precision}

max_new_tokens: 128
# Max tokens in conditioning window (fits well within 4096 RoPE limit)
max_position_id: 4096
max_conditioning_length: ${max_position_id}
memory_policy_fixed_delay:

llm_log_name: Llama-3.2-1B
