lora:
  enabled: false
  r: 8
  lora_alpha: 16
  lora_dropout: 0.05
  target_modules: [q_proj, v_proj]
  bias: "none"
  lr: 3.0e-4
  weight_decay: 0.01
  max_grad_norm: 1.0
  warmup_steps: 50
  num_epochs: 3
  batch_size: 1
  grad_accum_steps: 4
  max_seq_len: 8192
  # Matching ES setup
  mini_batch_size: 4      # Qasper samples per eval (same as ES)
  val_samples: 50          # Validation pool size (same as ES)
  eval_every: 25           # Eval every N optimizer steps (same as ES)
  checkpoint_every: 25     # Save checkpoint every N steps (same as ES)
  lora_ckpt: null
  namm_ckpt: null
  namm_active: false
  use_chat_template: false
  skip_baseline_eval: false
  train_split_ratio: null
  save_dir: "exp_local/lora_checkpoints"
